<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heroes III HotA - Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Open+Sans:wght@400;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            /* Kamenná textura v pozadí + tmavý přechod */
            background-color: #0d0d11;
            background-image: 
                radial-gradient(circle at center, rgba(31, 40, 51, 0.85) 0%, rgba(11, 12, 16, 0.95) 100%),
                url('https://www.transparenttextures.com/patterns/dark-stone-wall.png');
            color: #c5a059;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
            background: linear-gradient(180deg, #18191f 0%, #101114 100%);
            /* Kamenné okraje a styl desky z Heroes III */
            border: 3px solid #c5a059;
            border-radius: 8px;
            box-shadow: 0 0 35px rgba(0, 0, 0, 0.95), inset 0 0 20px rgba(197, 160, 89, 0.15);
            padding: 30px;
            position: relative;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #3a3223;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .logo {
            font-size: 60px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(241, 196, 15, 0.5));
            display: inline-block;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: #f1c40f;
            text-shadow: 2px 2px 4px #000, 0 0 12px rgba(241, 196, 15, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p { 
            color: #a0a3a8; 
            font-size: 0.95rem; 
            margin-top: 8px;
            letter-spacing: 1px;
            font-style: italic;
        }

        .top-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: #141519;
            border: 1px solid #3a3223;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.6);
        }

        .card .title { font-size: 0.8rem; color: #8a8d93; text-transform: uppercase; font-weight: 700; }
        .card .value { font-size: 1.5rem; font-family: 'Cinzel', serif; color: #ffffff; margin-top: 5px; font-weight: 700; }

        .leaderboard-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #c5a059;
            margin-bottom: 15px;
        }

        .table-wrapper { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; text-align: left; }

        th {
            font-family: 'Cinzel', serif;
            background-color: #1f2026;
            color: #f1c40f;
            padding: 12px 15px;
            font-size: 0.9rem;
            border-bottom: 2px solid #c5a059;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #282930;
            font-size: 0.95rem;
            color: #e0e0e0;
        }

        tbody tr {
            transition: transform 0.2s, background 0.2s;
        }

        tbody tr:nth-child(even) { background-color: #14151a; }
        
        tbody tr:hover {
            transform: scale(1.01);
            background: #23252e;
        }

        .rank-1 { color: #f1c40f; font-weight: bold; }
        .rank-2 { color: #e2e8f0; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }

        .badge-winrate {
            background: #059669;
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.8rem;
            color: #6b7280;
            border-top: 1px solid #282930;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <!-- Temná ikona zkřížených mečů -->
        <div class="logo">⚔️</div>

        <h1>Discord Heroes III HotA</h1>

        <p>Žebříček šampionů a válečníků</p>
    </div>

    <div class="top-cards">
        <div class="card">
            <div class="title">👑 Aktuální Král</div>
            <div class="value" id="top-player">-</div>
        </div>
        <div class="card">
            <div class="title">🎮 Celkem Odehraných Zápasů</div>
            <div class="value" id="total-games">-</div>
        </div>
    </div>

    <div class="leaderboard-title">🏆 Síň slávy</div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Hráč</th>
                    <th>Výhry (1st)</th>
                    <th>Bedna (TOP 3)</th>
                    <th>Zápasy</th>
                    <th>Prohry</th>
                    <th>Winrate</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="7" style="text-align:center;">Načítám data z Google Sheets...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        Synchronizováno s Google Tabulkou
    </div>
</div>

<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTBpAS7TdyBVQi1TIlKdt2cCJrVSC4X0Y0elDcUhY9g4rV0K9SaIowsn57yWeZJBYV_uVUatTUSUYA2/pub?gid=1436133630&single=true&output=csv';

    async function loadLeaderboard() {
        const tbody = document.getElementById('leaderboard-body');
        try {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('Nelze načíst data');
            
            const text = await response.text();
            const lines = text.trim().split(/\r?\n/);
            
            tbody.innerHTML = '';
            let players = [];

            const delimiter = text.includes(';') ? ';' : ',';

            for (let i = 0; i < lines.length; i++) {
                const cols = lines[i].split(delimiter).map(c => c.replace(/^"|"$/g, '').trim());
                if (!cols[0]) continue;

                const name = cols[0];

                if (['HRÁČ', 'Hráč', 'Jméno', 'NAME', '#'].includes(name)) continue;

                const wins = parseInt(cols[1]) || 0;
                const top3 = parseInt(cols[2]) || 0;
                const games = parseInt(cols[3]) || 0;
                const losses = parseInt(cols[4]) || 0;
                
                let winrate = cols[5] || '0 %';
                if (!winrate.includes('%')) {
                    const num = parseFloat(winrate.replace(',', '.'));
                    winrate = isNaN(num) ? '0 %' : (num <= 1 && num > 0 ? Math.round(num * 100) : Math.round(num)) + ' %';
                }

                players.push({ name, wins, top3, games, losses, winrate });
            }

            if (players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Žádní hráči v tabulce.</td></tr>';
                return;
            }

            players.sort((a, b) => b.wins - a.wins);

            let topPlayer = players[0].name;

            players.forEach((p, index) => {
                let rankClass = '';
                let medal = `${index + 1}.`;
                if (index === 0) { rankClass = 'rank-1'; medal = '🥇 1.'; }
                else if (index === 1) { rankClass = 'rank-2'; medal = '🥈 2.'; }
                else if (index === 2) { rankClass = 'rank-3'; medal = '🥉 3.'; }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="${rankClass}">${medal}</td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.wins}</td>
                    <td>${p.top3}</td>
                    <td>${p.games}</td>
                    <td>${p.losses}</td>
                    <td><span class="badge-winrate">${p.winrate}</span></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('top-player').innerText = topPlayer;
            const totalUniqueGames = players.reduce((sum, p) => sum + p.wins, 0);
            document.getElementById('total-games').innerText = totalUniqueGames;

        } catch (err) {
            console.error('Chyba načítání:', err);
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#ef4444;">Chyba při načítání CSV dat.</td></tr>';
        }
    }

    loadLeaderboard();
</script>

</body>
</html>
