<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heroes III HotA - Live Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Open+Sans:wght@400;600;700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0b0c10;
            background-image: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
            color: #c5a059;
            font-family: 'Open Sans', sans-serif;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(180deg, #18191f 0%, #101114 100%);
            border: 3px solid #c5a059;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9), inset 0 0 15px rgba(197, 160, 89, 0.2);
            padding: 25px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #3a3223;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            color: #f1c40f;
            text-shadow: 2px 2px 4px #000, 0 0 10px rgba(241, 196, 15, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header p { color: #8a8d93; font-size: 0.95rem; margin-top: 5px; }

        .top-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: #141519;
            border: 1px solid #3a3223;
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .card .title { font-size: 0.8rem; color: #8a8d93; text-transform: uppercase; font-weight: 700; }
        .card .value { font-size: 1.5rem; font-family: 'Cinzel', serif; color: #ffffff; margin-top: 5px; font-weight: 700; }

        .leaderboard-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: #c5a059;
            margin-bottom: 15px;
        }

        .table-wrapper { overflow-x: auto; }

        table { width: 100%; border-collapse: collapse; text-align: left; }

        th {
            font-family: 'Cinzel', serif;
            background-color: #1f2026;
            color: #f1c40f;
            padding: 12px 15px;
            font-size: 0.9rem;
            border-bottom: 2px solid #c5a059;
            text-transform: uppercase;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #282930;
            font-size: 0.95rem;
            color: #e0e0e0;
        }

        tr:nth-child(even) { background-color: #14151a; }
        tr:hover { background-color: #22242c; }

        .rank-1 { color: #f1c40f; font-weight: bold; }
        .rank-2 { color: #e2e8f0; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }

        .badge-winrate {
            background: #059669;
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.8rem;
            color: #555861;
            border-top: 1px solid #282930;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>⚔️ Discord Heroes III HotA ⚔️</h1>
        <p>Živě propojený žebříček šampionů</p>
    </div>

    <div class="top-cards">
        <div class="card">
            <div class="title">👑 Aktuální Král</div>
            <div class="value" id="top-player">-</div>
        </div>
        <div class="card">
            <div class="title">🎮 Celkem Zápasů Všech</div>
            <div class="value" id="total-games">-</div>
        </div>
    </div>

    <div class="leaderboard-title">🏆 Žebříček Hráčů</div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Hráč</th>
                    <th>Výhry (1st)</th>
                    <th>Bedna (TOP 3)</th>
                    <th>Zápasy</th>
                    <th>Prohry</th>
                    <th>Winrate</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <tr><td colspan="7" style="text-align:center;">Načítám data z Google Sheets...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="footer">
        Automaticky synchronizováno s Google Tabulkou
    </div>
</div>

<script>
    const SHEET_ID = '1qqhAWRNvpZsSWmJIMY6JV3qDA1D8VCTGIMrqws6hlBE';
    const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    async function loadLeaderboard() {
        const tbody = document.getElementById('leaderboard-body');
        try {
            const response = await fetch(GVIZ_URL);
            if (!response.ok) throw new Error('Nelze načíst data');
            
            const text = await response.text();
            const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
            const data = JSON.parse(jsonString);

            const rows = data.table.rows;
            tbody.innerHTML = '';

            let players = [];

            rows.forEach((row) => {
                if (!row.c) return;
                
                // Extrahujeme hodnoty ze všech buněk na řádku
                const vals = row.c.map(cell => cell ? (cell.f !== undefined ? cell.f : cell.v) : null);

                // Hledáme textové jméno (přeskočíme data Date(...), čísla a prázdné buňky)
                let name = null;
                let nameIdx = -1;

                for (let i = 0; i < vals.length; i++) {
                    const v = vals[i];
                    if (typeof v === 'string' && !v.startsWith('Date(') && v.trim() !== '' && isNaN(v) && !['HRÁČ', 'Hráč', 'Jméno', 'NAME', '#'].includes(v.trim())) {
                        name = v.trim();
                        nameIdx = i;
                        break;
                    }
                }

                if (!name) return; // Není to platný řádek hráče

                // Vytáhneme čísla z následujících sloupců po jménu
                const nums = [];
                for (let i = nameIdx + 1; i < vals.length; i++) {
                    let rawVal = vals[i];
                    if (rawVal !== null && rawVal !== undefined) {
                        let strVal = String(rawVal).replace('%', '').replace(',', '.').trim();
                        let numVal = parseFloat(strVal);
                        if (!isNaN(numVal)) {
                            nums.push(numVal);
                        }
                    }
                }

                // Přiřadíme hodnoty (s náhradními nulami, pokud chybí)
                const wins = nums[0] !== undefined ? nums[0] : 0;
                const top3 = nums[1] !== undefined ? nums[1] : 0;
                const games = nums[2] !== undefined ? nums[2] : 0;
                const losses = nums[3] !== undefined ? nums[3] : 0;
                
                let winrate = '0 %';
                if (nums[4] !== undefined) {
                    winrate = nums[4] <= 1 && nums[4] > 0 ? Math.round(nums[4] * 100) + ' %' : Math.round(nums[4]) + ' %';
                } else if (games > 0) {
                    winrate = Math.round((wins / games) * 100) + ' %';
                }

                players.push({ name, wins, top3, games, losses, winrate });
            });

            if (players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">Nenalezeni žádní hráči v tabulce.</td></tr>';
                return;
            }

            // Seřadíme hráče podle výher sestupně
            players.sort((a, b) => b.wins - a.wins);

            let topPlayer = players[0].name;
            let totalGamesSum = 0;

            players.forEach((p, index) => {
                totalGamesSum += p.games;

                let rankClass = '';
                let medal = `${index + 1}.`;
                if (index === 0) { rankClass = 'rank-1'; medal = '🥇 1.'; }
                else if (index === 1) { rankClass = 'rank-2'; medal = '🥈 2.'; }
                else if (index === 2) { rankClass = 'rank-3'; medal = '🥉 3.'; }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="${rankClass}">${medal}</td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.wins}</td>
                    <td>${p.top3}</td>
                    <td>${p.games}</td>
                    <td>${p.losses}</td>
                    <td><span class="badge-winrate">${p.winrate}</span></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('top-player').innerText = topPlayer;
            document.getElementById('total-games').innerText = Math.round(totalGamesSum / 2);

        } catch (err) {
            console.error('Chyba načítání:', err);
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#ef4444;">Chyba při zpracování dat.</td></tr>';
        }
    }

    loadLeaderboard();
</script>

</body>
</html>
